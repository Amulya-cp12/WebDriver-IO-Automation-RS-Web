name: WebdriverIO HTML Reporting
 
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
 
jobs:
  e2e-tests:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
 
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
 
      - name: Install Dependencies
        run: npm ci
 
      - name: Run WebdriverIO Tests
        run: npm run wdio
        env:
          CI: true
 
      - name: Upload HTML Test Report
        # Ensures reports are uploaded even if tests fail
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: webdriverio-html-report
          path: reports/html/
          retention-days: 7
 